<div class="command-dock">
  <div class="container command-dock-inner">
    <form class="command-console" id="commandConsole" autocomplete="off" aria-label="Command prompt">
      <label class="brand-prompt" for="commandInput">haniefutama@web:~$</label>
      <span class="command-caret">&gt;</span>
      <input
        class="command-input"
        id="commandInput"
        name="command"
        type="text"
        spellcheck="false"
        placeholder="type command (about, projects, /writing)"
        aria-label="Type command and press Enter"
      />
    </form>
    <span id="commandFeedback" class="command-feedback" aria-live="polite"></span>
  </div>
</div>
